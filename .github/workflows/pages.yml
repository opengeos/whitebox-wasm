name: Deploy demo to Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build wasm package into the demo dir
        run: |
          wasm-pack build crates/whitebox-wasm --release --target web \
            --out-dir "$GITHUB_WORKSPACE/site"
          cp demo/index.html site/index.html
          cp examples/sample.tif site/sample.tif
          rm -f site/.gitignore
          # cache-bust the glue + wasm together so returning visitors never
          # mix an old cached loader with a freshly built module
          sed -i "s/__BUILD__/${GITHUB_SHA}/g" site/index.html
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
