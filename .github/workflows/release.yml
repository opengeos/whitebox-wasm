name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write   # create releases / upload assets
  id-token: write   # OIDC token for npm Trusted Publishing (+ provenance)
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      # Trusted Publishing (OIDC) requires npm >= 11.5.1; the version bundled
      # bundled with the runner Node is older, so upgrade the CLI before publishing.
      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest

      - name: Build package
        run: wasm-pack build crates/whitebox-wasm --release --target web --out-dir pkg

      - name: Sync package version to tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd crates/whitebox-wasm/pkg
          npm version --no-git-tag-version --allow-same-version "$VERSION"

      # No NODE_AUTH_TOKEN needed: npm authenticates via the OIDC id-token from
      # the configured trusted publisher and attaches build provenance.
      - name: Publish to npm (Trusted Publishing)
        working-directory: crates/whitebox-wasm/pkg
        run: npm publish --access public

      - name: Stage release assets
        run: |
          mkdir -p dist
          cp crates/whitebox-wasm/pkg/whitebox_wasm_bg.wasm dist/whitebox-wasm-${GITHUB_REF_NAME}.wasm
          cp crates/whitebox-wasm/pkg/whitebox_wasm.js      dist/whitebox-wasm-${GITHUB_REF_NAME}.js
          cp crates/whitebox-wasm/pkg/whitebox_wasm.d.ts    dist/whitebox-wasm-${GITHUB_REF_NAME}.d.ts
          (cd dist && sha256sum * > SHA256SUMS.txt)

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
